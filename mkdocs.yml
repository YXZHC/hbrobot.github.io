site_name: 自主移动机器人使用文档
site_url: https://github.com/hbrobot/hbrobot.github.io.git

theme:
  name: material
  # 顶部 Logo 与 图标
  logo: images/61d7f15b093ae.png  # 顶部左侧 Logo
  favicon: images/szbs.ico  # 浏览器标签页图标
  icon:
    repo: fontawesome/brands/github # 顶部右上角仓库图标

  features:
    - navigation.tabs       # 顶部标签栏
    - navigation.sections   # 左侧菜单显示“分组标题”
    - navigation.top        # 右下角“回到顶部”按钮
    - search.suggest        # 搜索联想（输入时自动提示)
    - search.highlight      # 搜索结果高亮关键词
    - content.code.copy     # 代码复制
    - navigation.footer     # 底部显示上/下页按钮
    
  language: zh # 默认语言

  palette: 
    - scheme: default
      toggle:
        icon: material/weather-night
        name: 切换到暗色模式
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: 切换到亮色模式


plugins:
  - search
  - callouts

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.details      # 启用可折叠
  - pymdownx.superfences  # 允许块内嵌套代码/表格/列表
  - admonition            # 支持 Material 主题的提示框渲染
  - pymdownx.tasklist:    # 支持 - [ ] 任务列表复选框渲染
      clickable_checkbox: true  # 允许点击复选框（可选）

  # 引入图标扩展 (用于底部社交链接与顶部图标)
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      
  - attr_list

  - pymdownx.arithmatex:
      generic: true  # 兼容 $$、$、\[ \] 公式标记

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# 仓库链接
repo_url: https://github.com/hbrobot/hbrobot.github.io.git
repo_name: hbrobot/hbrobot.github.io
 
# 底部版权信息
copyright: 版权所有 &copy; 2026 汇博机器人 世界技能大赛移动机器人项目组
 
# 底部社交链接
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hbrobot
      name: GitHub
    - icon: fontawesome/brands/bilibili
      link: https://space.bilibili.com/489593500?spm_id_from=333.1007.0.0
      name: Bilibili
    - icon: fontawesome/solid/envelope
      link: mailto:contact@huibo-robot.com
      name: Email
  # 底部状态栏自定义 (可选：显示生成时间或版本)
  status:
    revision_date: true # 开启后底部显示页面最后更新时间
 

