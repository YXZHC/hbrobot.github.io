site_name: 自主移动机器人使用文档
# site_name_en: Autonomous Mobile Robot Documentation
# site_url: https://mydomain.org/mysite
theme:
  name: material
  favicon: images/szbs.ico          # 网站图标
  logo: images/61d7f15b093ae.png    # 首页logo

  features:
    - navigation.tabs       # 顶部标签栏
    - navigation.sections   # 左侧菜单显示“分组标题”
    - navigation.top        # 右下角“回到顶部”按钮
    - search.suggest        # 搜索联想（输入时自动提示)
    - search.highlight      # 搜索结果高亮关键词
    - content.code.copy     # 代码复制
    
  language: zh # 默认语言

  palette:
    # 自动模式的调色板切换
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: 切换到明亮模式
    # 明亮模式的调色板切换
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: 切换到黑暗模式
    # 黑暗模式的调色板切换
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 切换到系统偏好

  palette:
    primary: purple  # 主题颜色

extra:
  generator: false
  social:
    - icon: fontawesome/brands/bilibili
      link: https://space.bilibili.com/489593500?spm_id_from=333.1007.0.0

plugins:
  - search
  - callouts

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition            # 支持 Material 主题的提示框渲染
  - pymdownx.tasklist:    # 支持 - [ ] 任务列表复选框渲染
      clickable_checkbox: true  # 允许点击复选框（可选）



