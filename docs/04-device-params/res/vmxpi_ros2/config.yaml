    # 速度平滑器参数
    velocity_filter:
      index0:
        enable: True			       # 使能速度平滑器
        max_vel: 100.0           # 最大速度约束 (r/min)
        max_acc: 600.0           # 最大加速度 (r/min²)
        lowpass_coeff: 0.8       # 低通滤波系数 (0~1)
      index1:
        enable: True
        max_vel: 100.0
        max_acc: 600.0
        lowpass_coeff: 0.8
      index2:
        enable: True
        max_vel: 100.0
        max_acc: 600.0
